backend:
  name: test-repo

media_folder: "public/uploads"
public_folder: "/uploads"

collections:
  - name: "pages"
    label: "Pages"
    files:
      - file: "src/content/pages/home.md"
        label: "Home"
        name: "home"
        fields:
          - { label: Title, name: title, widget: string }
          - { label: "SEO Title", name: seoTitle, widget: string, required: false }
          - { label: "SEO Description", name: seoDescription, widget: text, required: false }
          - { label: "Hero Title", name: heroTitle, widget: string }
          - { label: "Hero Subtitle", name: heroSubtitle, widget: string, required: false }
          - { label: "Hero Image", name: heroImage, widget: image, required: false }
          - { label: "Show in Navigation", name: showInNav, widget: boolean, default: true }
          - { label: "Navigation Order", name: navOrder, widget: number, default: 1 }
          - { label: "Canonical URL", name: canonicalUrl, widget: string, required: false }
          - { label: "OG Image", name: ogImage, widget: image, required: false }
          - { label: Body, name: body, widget: markdown }

